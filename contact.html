  background: #f5f5f5;
  padding: 15px;

<body>

<div class="container">

<!-- HEADER -->
<header class="page-header">
  <img src="images/heading.jpg" style="width:100%;">

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-inner">

      <li><a href="index.html">Home</a></li>

    </ul>
  </div>

<hr>

<div class="row-fluid">

  <!-- LEFT: MAP -->
  <div class="span8">
    <h3>Interactive Climate Map (Ghana)</h3>
    <div id="map"></div>
  </div>

  <!-- RIGHT: INFO PANEL -->
  <div class="span4">
    <h3>Climate & Health Insights</h3>

    <div class="info-box" id="infoBox">
      <p>Click a region to view climate conditions and health impacts.</p>
    </div>

  </div>

</div>

<!-- FOOTER -->
<footer>
  <hr>
  <p><b>Climate and Health Research Lab</b><br>
  KNUST, Kumasi, Ghana</p>
</footer>

</div>

<!-- SCRIPT -->
<script>

// Initialize map
var map = L.map('map').setView([7.9465, -1.0232], 6);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// 🔹 SAMPLE DATA (REPLACE WITH YOUR REAL DATA LATER)
var climateData = {
  "Ashanti": { temp: 32, rain: "Moderate", humidity: 75, wind: 10 },
  "Greater Accra": { temp: 30, rain: "Low", humidity: 80, wind: 15 },
  "Northern": { temp: 35, rain: "Low", humidity: 60, wind: 12 }
};

// 🔹 LOAD GEOJSON
fetch('geoBoundaries-GHA-ADM1_simplified.geojson')
.then(res => res.json())
.then(data => {

  L.geoJSON(data, {

    style: function() {
      return {
        color: "#333",
        weight: 1,
        fillColor: "#6baed6",
        fillOpacity: 0.6
      };
    },

    onEachFeature: function(feature, layer) {

      layer.on('click', function() {

        // 🔥 IMPORTANT: Check your GeoJSON property name
        var region = feature.properties.shapeName || feature.properties.name;

        var d = climateData[region] || {
          temp: "N/A",
          rain: "N/A",
          humidity: "N/A",
          wind: "N/A"
        };

        // 🔥 HEALTH INTERPRETATION LOGIC
        var heatRisk = (d.temp > 34) ? "High" : (d.temp > 30 ? "Moderate" : "Low");
        var malariaRisk = (d.rain === "Moderate" || d.rain === "High") ? "Elevated" : "Low";

        document.getElementById("infoBox").innerHTML = `
          <h4>${region}</h4>
          <p>🌡 Temperature: ${d.temp} °C</p>
          <p>🌧 Rainfall: ${d.rain}</p>
          <p>💧 Humidity: ${d.humidity}%</p>
          <p>🌬 Wind: ${d.wind} km/h</p>

          <hr>

          <h4>Health Impacts</h4>
          <p>🔥 Heat Stress Risk: <b>${heatRisk}</b></p>
          <p>🦟 Malaria Risk: <b>${malariaRisk}</b></p>
        `;
      });

    }

  }).addTo(map);

});

</script>

<script src="js/jquery-1.9.1.min.js"></script>
<script src="js/bootstrap.min.js"></script>

</body>
</html>
