<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forecast - Climate And Health Research Lab</title>
<link rel="icon" type="image/png" href="images/lablogo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/bootstrap-responsive.min.css" rel="stylesheet">
<link href="css/theme.css" rel="stylesheet">

<style>
  body { padding-top: 0; }

  button {
    margin-right: 10px;
    margin-bottom: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header class="page-header">
        <img src="images/heading.jpg" style="width:100%;">
    </header>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="navbar-inner">
            <ul class="nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="people.html">People</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="teaching.html">Teaching</a></li>
                <li><a href="join.html">Join Us</a></li>
                <li class="active"><a href="#">Forecast</a></li>
            </ul>
        </div>
    </div>

    <hr>

    <!-- FORECAST SECTION -->
    <div class="row-fluid">
        <div class="span12">

            <h3>Forecast Dashboard</h3>
            <h4>Real-Time Weather Forecast (Kumasi, Ghana)</h4>

            <p><b>Last Updated:</b> <span id="date"></span></p>
            <p><b>Tip:</b> Use the buttons below to switch between climate variables.</p>

            <!-- BUTTONS -->
            <div style="margin-bottom:15px;">
                <button onclick="changeLayer('rain')">🌧 Rain</button>
                <button onclick="changeLayer('temp')">🌡 Temperature</button>
                <button onclick="changeLayer('wind')">🌬 Wind</button>
                <button onclick="changeLayer('clouds')">☁ Clouds</button>
            </div>

            <!-- WINDY MAP -->
            <iframe 
                id="windyMap"
                width="100%" 
                height="700" 
                src="https://embed.windy.com/embed2.html?lat=6.67&lon=-1.57&zoom=5&overlay=rain&menu=true&type=map"
                frameborder="0"
                style="border-radius:10px;">
            </iframe>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <hr>
        <p>Climate and Health Lab, KNUST, Kumasi, Ghana</p>
    </footer>

</div>

<!-- SCRIPTS -->
<script>
document.getElementById("date").innerHTML = new Date().toDateString();

function changeLayer(layer) {
    const iframe = document.getElementById("windyMap");
    iframe.src = `https://embed.windy.com/embed2.html?lat=6.67&lon=-1.57&zoom=5&overlay=${layer}&menu=true&type=map`;
}
</script>

<script src="js/jquery-1.9.1.min.js"></script>
<script src="js/bootstrap.min.js"></script>

</body>
</html>
